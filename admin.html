<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>UMali CEO Dashboard</title>
<style>
:root{--black:#0a0a0a;--dark:#111827;--card:#1a2235;--border:#2a3a55;--gold:#c9a84c;--gold2:#e8c96d;--green:#1a4a2e;--green2:#22c55e;--white:#f0ede6;--muted:#8a9ab5;--red:#ef4444;--orange:#f59e0b;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--black);color:var(--white);min-height:100vh;}
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 30% 20%,#1a4a2e44 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,#c9a84c11 0%,transparent 60%),var(--black);}
.login-box{background:var(--dark);border:1px solid var(--border);border-radius:24px;padding:40px 28px;width:100%;max-width:380px;text-align:center;}
.login-crown{font-size:48px;margin-bottom:16px;}
.login-title{font-size:26px;font-weight:800;color:var(--gold);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:32px;}
.field{margin-bottom:16px;text-align:left;}
.field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;}
.field input{width:100%;padding:14px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;color:var(--white);font-size:15px;outline:none;transition:.2s;font-family:inherit;}
.field input:focus{border-color:var(--gold);}
.btn-login{width:100%;padding:15px;background:linear-gradient(135deg,var(--gold),#a07830);border:none;border-radius:12px;color:var(--black);font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;transition:.2s;font-family:inherit;}
.btn-login:active{transform:scale(.98);}
.login-warn{font-size:11px;color:var(--muted);margin-top:16px;}
#mainApp{display:none;}
.topnav{background:var(--dark);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topnav-brand{display:flex;align-items:center;gap:10px;}
.topnav-logo{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#7a5a1a);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:var(--black);}
.topnav-title{font-size:16px;font-weight:800;color:var(--gold);}
.topnav-sub{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.btn-signout{padding:8px 14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.hero{background:linear-gradient(135deg,var(--green) 0%,#0f2d1f 100%);padding:24px 20px;border-bottom:1px solid var(--border);}
.hero-title{font-size:13px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;}
.hero-name{font-size:22px;font-weight:800;color:var(--gold);margin-bottom:4px;}
.hero-date{font-size:12px;color:rgba(255,255,255,.4);}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 20px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.stat-value{font-size:28px;font-weight:900;margin-top:4px;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.sv-gold{color:var(--gold);}.sv-green{color:var(--green2);}.sv-red{color:var(--red);}.sv-orange{color:var(--orange);}
.filter-tabs{display:flex;gap:8px;overflow-x:auto;padding:0 20px 16px;}
.filter-tabs::-webkit-scrollbar{display:none;}
.ftab{flex-shrink:0;padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap;font-family:inherit;}
.ftab.active{background:rgba(201,168,76,.15);border-color:rgba(201,168,76,.4);color:var(--gold);}
.section{padding:0 20px 20px;}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 12px;}
.section-title{font-size:16px;font-weight:700;color:var(--white);}
.btn-refresh{display:flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);border-radius:8px;color:var(--gold);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.fh-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px;}
.fh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.fh-name{font-size:16px;font-weight:700;color:var(--white);}
.fh-meta{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5;}
.badge{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0;margin-left:8px;}
.badge-pending{background:rgba(245,158,11,.15);color:var(--orange);border:1px solid rgba(245,158,11,.3);}
.badge-active{background:rgba(34,197,94,.15);color:var(--green2);border:1px solid rgba(34,197,94,.3);}
.badge-suspended{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.fh-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.fh-detail-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.fh-detail-value{font-size:13px;color:var(--white);font-weight:500;margin-top:2px;}
.fh-actions{display:flex;gap:8px;}
.btn-action{flex:1;padding:11px 8px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit;}
.btn-activate{background:rgba(34,197,94,.15);color:var(--green2);border:1px solid rgba(34,197,94,.3);}
.btn-suspend{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.btn-reactivate{background:rgba(34,197,94,.15);color:var(--green2);border:1px solid rgba(34,197,94,.3);}
.btn-view{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border);}
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:44px;margin-bottom:12px;}
.empty-title{font-size:15px;font-weight:600;color:var(--white);margin-bottom:6px;}
.empty-text{font-size:13px;line-height:1.6;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--dark);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:28px 20px 48px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;transform:translateY(40px);transition:.3s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-title{font-size:18px;font-weight:800;color:var(--gold);margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;}
.modal-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.modal-row:last-child{border-bottom:none;}
.modal-key{font-size:12px;color:var(--muted);}
.modal-val{font-size:13px;color:var(--white);font-weight:500;text-align:right;max-width:60%;word-break:break-all;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--border);padding:13px 22px;border-radius:14px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:999;white-space:nowrap;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.loading{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.dot-live{width:7px;height:7px;border-radius:50%;background:var(--green2);display:inline-block;animation:pulse 2s infinite;margin-right:5px;}
.pb80{padding-bottom:80px;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-crown">👑</div>
    <div class="login-title">UMali CEO</div>
    <div class="login-sub">Private dashboard — authorised access only</div>
    <div class="field"><label>Email Address</label><input type="email" id="loginEmail" placeholder="andisashabalala758@gmail.com" /></div>
    <div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="Enter your password" /></div>
    <button class="btn-login" onclick="doLogin()">🔐 Sign In to Dashboard</button>
    <div class="login-warn">⚠️ Authorised UMALI (PTY) LTD personnel only.</div>
  </div>
</div>

<div id="mainApp">
  <nav class="topnav">
    <div class="topnav-brand">
      <div class="topnav-logo">U</div>
      <div>
        <div class="topnav-title">UMali CEO</div>
        <div class="topnav-sub"><span class="dot-live"></span>Live Dashboard</div>
      </div>
    </div>
    <button class="btn-signout" onclick="doSignOut()">Sign Out</button>
  </nav>
  <div class="pb80">
    <div class="hero">
      <div class="hero-title">Control Panel</div>
      <div class="hero-name">UMALI (PTY) LTD</div>
      <div class="hero-date" id="heroDate"></div>
    </div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-label">Total Homes</div><div class="stat-value sv-gold" id="statTotal">—</div><div class="stat-sub">Registered</div></div>
      <div class="stat"><div class="stat-label">Active</div><div class="stat-value sv-green" id="statActive">—</div><div class="stat-sub">Operating now</div></div>
      <div class="stat"><div class="stat-label">Pending</div><div class="stat-value sv-orange" id="statPending">—</div><div class="stat-sub">Awaiting approval</div></div>
      <div class="stat"><div class="stat-label">Suspended</div><div class="stat-value sv-red" id="statSuspended">—</div><div class="stat-sub">Locked out</div></div>
    </div>
    <div class="filter-tabs">
      <button class="ftab active" onclick="filterHomes('all',this)">All</button>
      <button class="ftab" onclick="filterHomes('pending',this)">⏳ Pending</button>
      <button class="ftab" onclick="filterHomes('active',this)">✅ Active</button>
      <button class="ftab" onclick="filterHomes('suspended',this)">🚫 Suspended</button>
    </div>
    <div class="section">
      <div class="section-header">
        <div class="section-title">Funeral Homes</div>
        <button class="btn-refresh" onclick="loadHomes()">🔄 Refresh</button>
      </div>
      <div id="homesList"><div class="loading"><div class="spinner"></div><br>Loading...</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title"><span id="modalTitle">Details</span><button class="modal-close" onclick="closeDetailModal()">×</button></div>
    <div id="modalBody"></div>
    <div style="margin-top:20px;display:flex;gap:10px;" id="modalActions"></div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, getDocs, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:"AIzaSyC4OFkK0w-A9uaDgD0peCD4cq0z6GySIXI",
  authDomain:"umali-3bcb8.firebaseapp.com",
  projectId:"umali-3bcb8",
  storageBucket:"umali-3bcb8.firebasestorage.app",
  messagingSenderId:"294155035969",
  appId:"1:294155035969:web:9b21ccbbf91bff48f92dc0"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const CEO  = 'andisashabalala758@gmail.com';

let allHomes = [], currentFilter = 'all';

document.getElementById('heroDate').textContent =
  new Date().toLocaleDateString('en-ZA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
window.showToast = showToast;

onAuthStateChanged(auth, user => {
  if (user && user.email === CEO) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    loadHomes();
  } else if (user) {
    signOut(auth);
    showToast('Access denied');
  }
});

window.doLogin = async function() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value.trim();
  if (!email || !pass) { showToast('Enter email and password'); return; }
  if (email !== CEO) { showToast('Access denied'); return; }
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    showToast('Wrong password or email');
  }
};

window.doSignOut = async function() {
  await signOut(auth);
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
};

window.loadHomes = async function() {
  document.getElementById('homesList').innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading...</div>';
  try {
    const snap = await getDocs(collection(db, 'funeralHomes'));
    allHomes = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    updateStats();
    renderHomes(currentFilter);
  } catch(e) {
    document.getElementById('homesList').innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Error loading data</div><div class="empty-text">'+e.message+'</div></div>';
  }
};

function updateStats() {
  document.getElementById('statTotal').textContent     = allHomes.length;
  document.getElementById('statActive').textContent    = allHomes.filter(h=>(h.status||'pending')==='active').length;
  document.getElementById('statPending').textContent   = allHomes.filter(h=>(h.status||'pending')==='pending').length;
  document.getElementById('statSuspended').textContent = allHomes.filter(h=>h.status==='suspended').length;
}

window.filterHomes = function(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderHomes(filter);
};

function renderHomes(filter) {
  let homes = filter === 'all' ? allHomes : allHomes.filter(h=>(h.status||'pending')===filter);
  if (!homes.length) {
    const msgs = {all:['🏢','No Funeral Homes Yet','No funeral homes have registered on UMali yet.'],pending:['⏳','No Pending Homes','All registered homes have been reviewed.'],active:['✅','No Active Homes','No funeral homes are currently active.'],suspended:['🚫','No Suspended Homes','No funeral homes are currently suspended.']};
    const [icon,title,text] = msgs[filter]||msgs.all;
    document.getElementById('homesList').innerHTML = `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><div class="empty-text">${text}</div></div>`;
    return;
  }
  const order = {pending:0,active:1,suspended:2};
  homes = [...homes].sort((a,b)=>(order[a.status||'pending']||0)-(order[b.status||'pending']||0));
  document.getElementById('homesList').innerHTML = homes.map(h => {
    const status = h.status||'pending';
    const badge  = `<span class="badge badge-${status}">${status==='pending'?'⏳ Pending':status==='active'?'✅ Active':'🚫 Suspended'}</span>`;
    const date   = h.registeredAt ? new Date(h.registeredAt).toLocaleDateString('en-ZA') : (h.dateAdded||'—');
    let btns = '';
    if (status==='pending')   btns = `<button class="btn-action btn-activate" onclick="setStatus('${h.id}','active')">✅ Approve</button><button class="btn-action btn-view" onclick="viewHome('${h.id}')">👁 Details</button>`;
    if (status==='active')    btns = `<button class="btn-action btn-suspend" onclick="setStatus('${h.id}','suspended')">🚫 Suspend</button><button class="btn-action btn-view" onclick="viewHome('${h.id}')">👁 Details</button>`;
    if (status==='suspended') btns = `<button class="btn-action btn-reactivate" onclick="setStatus('${h.id}','active')">🔓 Reactivate</button><button class="btn-action btn-view" onclick="viewHome('${h.id}')">👁 Details</button>`;
    return `<div class="fh-card">
      <div class="fh-top"><div><div class="fh-name">${h.name||'Unnamed Funeral Home'}</div><div class="fh-meta">${h.location||h.address||'—'}</div></div>${badge}</div>
      <div class="fh-info">
        <div><div class="fh-detail-label">Email</div><div class="fh-detail-value" style="font-size:11px;">${h.email||'—'}</div></div>
        <div><div class="fh-detail-label">Phone</div><div class="fh-detail-value">${h.phone||'—'}</div></div>
        <div><div class="fh-detail-label">Registered</div><div class="fh-detail-value">${date}</div></div>
        <div><div class="fh-detail-label">Members</div><div class="fh-detail-value">${h.memberCount||0}</div></div>
      </div>
      <div class="fh-actions">${btns}</div>
    </div>`;
  }).join('');
}

window.setStatus = async function(id, newStatus) {
  const home = allHomes.find(h=>h.id===id);
  const name = home ? (home.name||'This funeral home') : 'This funeral home';
  const msg  = newStatus==='active' ? `Approve "${name}"?\nThey get full dashboard access immediately.` : `Suspend "${name}"?\nThey will be locked out immediately.`;
  if (!confirm(msg)) return;
  try {
    await updateDoc(doc(db,'funeralHomes',id),{status:newStatus,statusUpdated:new Date().toISOString(),statusUpdatedBy:CEO});
    const idx = allHomes.findIndex(h=>h.id===id);
    if (idx!==-1) allHomes[idx].status = newStatus;
    updateStats();
    renderHomes(currentFilter);
    closeDetailModal();
    showToast(newStatus==='active' ? `✅ ${name} approved!` : `🚫 ${name} suspended!`);
  } catch(e) { showToast('Error: '+e.message); }
};

window.viewHome = function(id) {
  const h = allHomes.find(h=>h.id===id);
  if (!h) return;
  const status = h.status||'pending';
  document.getElementById('modalTitle').textContent = h.name||'Funeral Home';
  const fields = [
    ['Status', status==='active'?'✅ Active':status==='suspended'?'🚫 Suspended':'⏳ Pending'],
    ['Email', h.email||'—'],['Phone', h.phone||'—'],
    ['Address', h.address||h.location||'—'],
    ['Underwriter', h.underwriter||'Independent'],
    ['Registered', h.registeredAt?new Date(h.registeredAt).toLocaleDateString('en-ZA'):(h.dateAdded||'—')],
    ['Members', String(h.memberCount||0)],
    ['R499 Paid', h.installationPaid?'✅ Yes':'⏳ Not confirmed'],
    ['Commission', h.commissionRate?(h.commissionRate+'%'):'6–9% (TBD)'],
    ['Firebase ID', h.id],
  ];
  document.getElementById('modalBody').innerHTML = fields.map(([k,v])=>`<div class="modal-row"><span class="modal-key">${k}</span><span class="modal-val">${v}</span></div>`).join('');
  let ab = '';
  if (status==='pending')   ab=`<button class="btn-action btn-activate" style="flex:1;padding:14px;" onclick="setStatus('${id}','active')">✅ Approve Now</button>`;
  if (status==='active')    ab=`<button class="btn-action btn-suspend" style="flex:1;padding:14px;" onclick="setStatus('${id}','suspended')">🚫 Suspend</button>`;
  if (status==='suspended') ab=`<button class="btn-action btn-reactivate" style="flex:1;padding:14px;" onclick="setStatus('${id}','active')">🔓 Reactivate</button>`;
  document.getElementById('modalActions').innerHTML = ab;
  document.getElementById('detailModal').classList.add('open');
};

window.closeModal = e => { if (e.target.id==='detailModal') closeDetailModal(); };
window.closeDetailModal = () => document.getElementById('detailModal').classList.remove('open');
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key==='Enter') window.doLogin(); });
</script>
</body>
</html>
